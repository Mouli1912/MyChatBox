<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChatBox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="bi bi-wechat" style="font-size:28px;"></i>
                <h2>Chats</h2>
            </div>

        </div>
    
        <ul>
            <li>
            <li><i class="bi bi-chat"></i>New Chat</li>
            <li><i class="bi bi-clock-history"></i>History</li>
            <li><i class="bi bi-card-image"></i>Image</li>
            <li><i class="bi bi-app-indicator"></i>App</li>
            <li><i class="bi bi-code-slash"></i>Codex</li>
            <li><i class="bi bi-person-rolodex"></i>My Accounts</li>
            <li><i class="bi bi-gear-wide-connected"></i>Settings</li>
            <li><i class="bi bi-person-raised-hand"></i>Help</li>
            </li>

        </ul>
    </div>
    <div class="main-content">
        <div class="chat-window">
            <!-- Chat messages will go here -->
        </div>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type a message..." required>
            <button id="sendButton">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
