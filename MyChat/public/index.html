<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChatBox</title>

    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <div class="sidebar-header">
        <div class="logo">
            <i class="bi bi-wechat" style="font-size:28px;"></i>
            <h2>Chats</h2>
        </div>
    </div>

    <ul>
        <li><i class="bi bi-chat"></i> New Chat</li>
        <li><i class="bi bi-clock-history"></i> History</li>
        <li><i class="bi bi-card-image"></i> Image</li>
        <li><i class="bi bi-app-indicator"></i> App</li>
        <li><i class="bi bi-code-slash"></i> Codex</li>
        <li><i class="bi bi-person-rolodex"></i> My Accounts</li>
        <li><i class="bi bi-gear-wide-connected"></i> Settings</li>
        <li><i class="bi bi-person-raised-hand"></i> Help</li>
    </ul>

</div>

<!-- Main Chat Area -->
<div class="main-content">

    <div class="chat-window">
        <ul id="messages">
            
        </ul>
    </div>

    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendButton">Send</button>
    </div>

</div>

<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>

<!-- JS file -->
<script src="script.js?v=2"></script>

</body>
</html>
